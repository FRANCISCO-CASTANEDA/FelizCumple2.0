<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Feliz Cumpleaños BBMO!!</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(145deg, #1a1a2e 0%, #16213e 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', 'Poppins', 'Dancing Script', 'Pacifico', cursive, system-ui, -apple-system, sans-serif;
            overflow: hidden;
            position: relative;
        }

        /* Fondo de partículas sutiles */
        .particle-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        .particle {
            position: absolute;
            background: rgba(255, 200, 220, 0.4);
            border-radius: 50%;
            animation: floatParticle 12s infinite ease-in-out;
            filter: blur(1px);
        }

        @keyframes floatParticle {
            0% {
                transform: translateY(100vh) translateX(0) rotate(0deg);
                opacity: 0;
            }
            10% {
                opacity: 0.6;
            }
            90% {
                opacity: 0.5;
            }
            100% {
                transform: translateY(-20vh) translateX(40px) rotate(360deg);
                opacity: 0;
            }
        }

        /* Tarjeta principal */
        .card {
            position: relative;
            z-index: 10;
            background: rgba(255, 248, 245, 0.92);
            backdrop-filter: blur(10px);
            border-radius: 80px 80px 70px 70px;
            box-shadow: 0 30px 50px rgba(0, 0, 0, 0.3), 0 0 0 1px rgba(255, 255, 200, 0.2), inset 0 1px 4px rgba(255, 255, 255, 0.8);
            padding: 2.5rem 2.8rem 3rem 2.8rem;
            text-align: center;
            transition: transform 0.3s ease;
            animation: floatCard 4s ease-in-out infinite;
            max-width: 550px;
            width: 90%;
            margin: 20px;
        }

        @keyframes floatCard {
            0% {
                transform: translateY(0px);
            }
            50% {
                transform: translateY(-8px);
            }
            100% {
                transform: translateY(0px);
            }
        }

        /* Texto principal */
        .birthday-text {
            font-size: 3.2rem;
            font-weight: bold;
            background: linear-gradient(135deg, #d43f1f, #ff7e5e, #ffb347, #ff6a88);
            background-size: 300% 300%;
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            letter-spacing: 3px;
            text-shadow: 2px 2px 12px rgba(0,0,0,0.1);
            animation: gradientShift 5s ease infinite, textGlow 2.5s ease-in-out infinite alternate;
            margin-bottom: 0.5rem;
        }

        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        @keyframes textGlow {
            0% { text-shadow: 0 0 2px rgba(255,100,100,0.2);}
            100% { text-shadow: 0 0 15px rgba(255,80,80,0.6);}
        }

        /* Subtítulo o decoración */
        .sub {
            font-size: 1.1rem;
            color: #c06c54;
            font-family: 'Segoe UI', cursive;
            letter-spacing: 1px;
            margin-bottom: 30px;
            border-top: 1px dashed #ffb7a7;
            display: inline-block;
            padding-top: 8px;
            opacity: 0.85;
        }

        /* Contenedor de la rosa */
        .rose-container {
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 20px 0 25px 0;
            perspective: 800px;
        }

        /* Rosa animada (SVG con animación sutil) */
        .rose {
            width: 160px;
            height: 160px;
            cursor: pointer;
            filter: drop-shadow(0 12px 18px rgba(0, 0, 0, 0.25));
            animation: roseFloat 2.8s ease-in-out infinite, rosePetalBreath 3s infinite alternate;
            transform-origin: center center;
            transition: all 0.2s;
        }

        .rose:hover {
            filter: drop-shadow(0 20px 25px rgba(220, 60, 30, 0.4));
            transform: scale(1.02);
        }

        @keyframes roseFloat {
            0% { transform: translateY(0px) rotate(0deg);}
            50% { transform: translateY(-8px) rotate(1deg);}
            100% { transform: translateY(0px) rotate(0deg);}
        }

        @keyframes rosePetalBreath {
            0% { transform: scale(1);}
            100% { transform: scale(1.02);}
        }

        /* mensaje de cariño extra */
        .greeting {
            font-size: 1.2rem;
            color: #aa5a3e;
            font-style: italic;
            margin: 20px 0 10px;
            font-weight: 500;
            background: rgba(255, 235, 220, 0.7);
            display: inline-block;
            padding: 6px 20px;
            border-radius: 60px;
            backdrop-filter: blur(4px);
        }

        /* Confeti animado (opcional) */
        .confetti {
            position: fixed;
            width: 10px;
            height: 10px;
            background-color: #ffb56b;
            opacity: 0.7;
            z-index: 20;
            pointer-events: none;
            animation: confettiFall 4s linear forwards;
        }

        @keyframes confettiFall {
            0% {
                transform: translateY(-20vh) rotate(0deg);
                opacity: 1;
            }
            100% {
                transform: translateY(110vh) rotate(360deg);
                opacity: 0;
            }
        }

        /* Botón corazón */
        .heart-btn {
            background: none;
            border: none;
            font-size: 2rem;
            margin-top: 20px;
            cursor: pointer;
            transition: transform 0.2s ease;
            filter: drop-shadow(0 2px 5px rgba(0,0,0,0.2));
        }
        .heart-btn:hover {
            transform: scale(1.2);
        }

        .footer-note {
            margin-top: 15px;
            font-size: 0.75rem;
            color: #c47e64;
            letter-spacing: 0.5px;
        }

        @media (max-width: 520px) {
            .card {
                padding: 1.8rem 1.5rem 2.2rem 1.5rem;
            }
            .birthday-text {
                font-size: 2.2rem;
            }
            .rose {
                width: 120px;
                height: 120px;
            }
            .greeting {
                font-size: 1rem;
            }
        }

        /* animación adicional de brillo */
        @keyframes gentleSpark {
            0% { opacity: 0.3; transform: scale(0.9);}
            100% { opacity: 1; transform: scale(1.2);}
        }
    </style>
</head>
<body>

<div class="particle-bg" id="particleBg"></div>

<div class="card">
    <div class="birthday-text">🎂 Feliz Cumpleaños BBMO 🎂</div>
    <div class="sub">★ un día muy especial ★</div>

    <!-- Rosa SVG animada y elegante -->
    <div class="rose-container">
        <div class="rose" id="roseElement">
            <svg viewBox="0 0 120 120" width="100%" height="100%" xmlns="http://www.w3.org/2000/svg">
                <defs>
                    <radialGradient id="petalGrad1" cx="50%" cy="30%" r="70%">
                        <stop offset="0%" stop-color="#ff4d6d" />
                        <stop offset="70%" stop-color="#d90429" />
                        <stop offset="100%" stop-color="#800f2f" />
                    </radialGradient>
                    <radialGradient id="petalGrad2" cx="40%" cy="30%" r="70%">
                        <stop offset="0%" stop-color="#ff758f" />
                        <stop offset="60%" stop-color="#e5383b" />
                        <stop offset="100%" stop-color="#9d0208" />
                    </radialGradient>
                    <linearGradient id="stemGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                        <stop offset="0%" stop-color="#2b9348" />
                        <stop offset="100%" stop-color="#0a5c2e" />
                    </linearGradient>
                    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
                        <feGaussianBlur in="SourceAlpha" stdDeviation="2" />
                        <feOffset dx="1" dy="2" />
                        <feComponentTransfer><feFuncA type="linear" slope="0.3"/></feComponentTransfer>
                        <feMerge>
                            <feMergeNode />
                            <feMergeNode in="SourceGraphic" />
                        </feMerge>
                    </filter>
                </defs>
                <!-- tallo y hojas -->
                <path d="M60 76 L55 110 L65 110 L60 76" fill="url(#stemGrad)" stroke="#1e6b3b" stroke-width="1.2" />
                <path d="M58 90 Q38 86 32 94 Q44 96 58 94" fill="#3ba55d" stroke="#206a41" stroke-width="0.8" />
                <path d="M62 88 Q82 82 88 92 Q76 96 62 93" fill="#3ba55d" stroke="#206a41" stroke-width="0.8" />
                <!-- pétalos internos y externos con suave animación de latido -->
                <g filter="url(#softShadow)">
                    <!-- pétalos externos -->
                    <path d="M60 38 C38 38 28 54 32 70 C36 80 48 84 60 82 C72 84 84 80 88 70 C92 54 82 38 60 38Z" fill="url(#petalGrad1)" stroke="#a4161a" stroke-width="0.8">
                        <animateTransform attributeName="transform" type="scale" values="1; 1.02; 1" dur="3s" repeatCount="indefinite" additive="sum" />
                    </path>
                    <!-- capa de pétalos medios -->
                    <path d="M60 44 C46 46 38 58 42 70 C46 78 54 78 60 76 C66 78 74 78 78 70 C82 58 74 46 60 44Z" fill="url(#petalGrad2)" stroke="#ba2c3a" stroke-width="0.6">
                        <animateTransform attributeName="transform" type="scale" values="1; 1.015; 1" dur="2.6s" repeatCount="indefinite" additive="sum" />
                    </path>
                    <!-- pétalos internos formando capullo -->
                    <path d="M60 52 C52 54 48 62 52 68 C55 73 58 74 60 72 C62 74 65 73 68 68 C72 62 68 54 60 52Z" fill="#ff1e4d" stroke="#c9182a" stroke-width="0.5">
                        <animate attributeName="opacity" values="0.9;1;0.9" dur="2s" repeatCount="indefinite" />
                    </path>
                    <!-- centro de la rosa -->
                    <circle cx="60" cy="63" r="6" fill="#ffb3c6" stroke="#ff4d6d" stroke-width="0.8">
                        <animate attributeName="r" values="5.5;6.2;5.5" dur="2.2s" repeatCount="indefinite" />
                    </circle>
                    <!-- brillo sutil -->
                    <ellipse cx="55" cy="58" rx="3" ry="2" fill="rgba(255,245,210,0.7)">
                        <animate attributeName="opacity" values="0.4;0.9;0.4" dur="1.8s" repeatCount="indefinite" />
                    </ellipse>
                </g>
                <!-- hojas pequeñas decorativas del tallo -->
                <path d="M56 100 Q48 96 45 102 Q53 104 57 101" fill="#55b86b" stroke="#216d3a" stroke-width="0.5" />
                <path d="M64 102 Q72 98 74 104 Q66 106 63 103" fill="#55b86b" stroke="#216d3a" stroke-width="0.5" />
            </svg>
        </div>
    </div>

    <div class="greeting"> Que todos tus deseos se hagan realidad ✨</div>
    <button class="heart-btn" id="heartConfettiBtn">🌸💖🌸</button>
    <div class="footer-note">con mucho cariño, para PuchuMO 🌹</div>
</div>

<script>
    (function() {
        // Crear partículas flotantes de fondo suave
        const particleContainer = document.getElementById('particleBg');
        const particleCount = 70;
        
        for(let i = 0; i < particleCount; i++) {
            const particle = document.createElement('div');
            particle.classList.add('particle');
            const size = Math.random() * 8 + 3;
            particle.style.width = size + 'px';
            particle.style.height = size + 'px';
            particle.style.left = Math.random() * 100 + '%';
            particle.style.animationDelay = Math.random() * 15 + 's';
            particle.style.animationDuration = Math.random() * 12 + 8 + 's';
            particle.style.background = `rgba(255, 180, 170, ${Math.random() * 0.5 + 0.2})`;
            particle.style.opacity = Math.random() * 0.5 + 0.2;
            particleContainer.appendChild(particle);
        }

        // función para lanzar confetti suave y brillante (mejorada)
        function launchConfetti() {
            const colors = ['#ff5e62', '#ff9966', '#ffb347', '#ff6f91', '#ff85a1', '#fbc2c2', '#ffbc7a', '#ffd166'];
            const confettiCount = 140;
            for (let i = 0; i < confettiCount; i++) {
                const conf = document.createElement('div');
                conf.classList.add('confetti');
                const sizeW = Math.random() * 12 + 5;
                const sizeH = Math.random() * 8 + 4;
                conf.style.width = sizeW + 'px';
                conf.style.height = sizeH + 'px';
                conf.style.left = Math.random() * 100 + '%';
                conf.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                conf.style.borderRadius = Math.random() > 0.6 ? '50%' : '2px';
                conf.style.opacity = Math.random() * 0.9 + 0.5;
                const duration = Math.random() * 2.5 + 2.2;
                conf.style.animation = `confettiFall ${duration}s linear forwards`;
                conf.style.animationDelay = Math.random() * 0.5 + 's';
                document.body.appendChild(conf);
                setTimeout(() => {
                    if(conf && conf.remove) conf.remove();
                }, duration * 1000 + 300);
            }
        }

        // Efecto de onda en la rosa al hacer click o tocar
        const roseDiv = document.getElementById('roseElement');
        const cardDiv = document.querySelector('.card');

        function burstSparkles() {
            // Crear pequeños destellos alrededor de la rosa para más alegría
            for(let s=0; s<24; s++) {
                const spark = document.createElement('div');
                spark.style.position = 'fixed';
                spark.style.width = '6px';
                spark.style.height = '6px';
                spark.style.backgroundColor = `hsl(${Math.random() * 40 + 340}, 90%, 70%)`;
                spark.style.borderRadius = '50%';
                spark.style.pointerEvents = 'none';
                spark.style.zIndex = '999';
                spark.style.opacity = '0.9';
                const rect = roseDiv.getBoundingClientRect();
                const centerX = rect.left + rect.width / 2;
                const centerY = rect.top + rect.height / 2;
                const angle = Math.random() * Math.PI * 2;
                const radius = Math.random() * 45 + 15;
                const startX = centerX + (Math.random() - 0.5) * 25;
                const startY = centerY + (Math.random() - 0.5) * 25;
                spark.style.left = startX + 'px';
                spark.style.top = startY + 'px';
                document.body.appendChild(spark);
                const targetX = centerX + Math.cos(angle) * radius;
                const targetY = centerY + Math.sin(angle) * radius;
                spark.animate([
                    { transform: 'scale(0.2)', opacity: 1, left: `${startX}px`, top: `${startY}px` },
                    { transform: 'scale(1.2)', opacity: 0.7, left: `${targetX}px`, top: `${targetY}px` },
                    { transform: 'scale(0)', opacity: 0, left: `${targetX + (Math.random() - 0.5)*12}px`, top: `${targetY + (Math.random() - 0.5)*12}px` }
                ], {
                    duration: 700,
                    easing: 'cubic-bezier(0.2, 0.9, 0.4, 1.1)',
                    fill: 'forwards'
                });
                setTimeout(() => spark.remove(), 800);
            }
        }

        // evento principal: clic en la rosa lanza confeti y chispitas, también mensaje sutil
        roseDiv.addEventListener('click', (e) => {
            e.stopPropagation();
            launchConfetti();
            burstSparkles();
            // Cambio opcional: pequeña animación extra en el texto
            const textElem = document.querySelector('.birthday-text');
            textElem.style.transform = 'scale(1.02)';
            setTimeout(() => { textElem.style.transform = ''; }, 200);
            // Crear mensaje temporal flotante de cariño
            const loveMsg = document.createElement('div');
            loveMsg.innerText = '🌹 ¡Te quiero mucho! 🌹';
            loveMsg.style.position = 'fixed';
            loveMsg.style.bottom = '25%';
            loveMsg.style.left = '50%';
            loveMsg.style.transform = 'translateX(-50%)';
            loveMsg.style.backgroundColor = 'rgba(0,0,0,0.6)';
            loveMsg.style.color = '#ffe0d4';
            loveMsg.style.padding = '8px 20px';
            loveMsg.style.borderRadius = '40px';
            loveMsg.style.fontFamily = "'Segoe UI', cursive";
            loveMsg.style.fontWeight = 'bold';
            loveMsg.style.fontSize = '1rem';
            loveMsg.style.backdropFilter = 'blur(6px)';
            loveMsg.style.zIndex = '1000';
            loveMsg.style.pointerEvents = 'none';
            loveMsg.style.whiteSpace = 'nowrap';
            loveMsg.style.letterSpacing = '1px';
            loveMsg.style.animation = 'gentleSpark 0.4s ease-out forwards';
            document.body.appendChild(loveMsg);
            setTimeout(() => {
                loveMsg.style.opacity = '0';
                loveMsg.style.transition = 'opacity 0.6s';
                setTimeout(() => loveMsg.remove(), 700);
            }, 1700);
        });

        // Botón corazón adicional para más confeti y celebración
        const heartBtn = document.getElementById('heartConfettiBtn');
        heartBtn.addEventListener('click', (e) => {
            e.preventDefault();
            launchConfetti();
            // También generar una ráfaga extra de corazones animados
            for(let i=0; i<28; i++) {
                const heartSpan = document.createElement('div');
                heartSpan.innerHTML = ['🌸','🌺','🌼','❤️','🧡','💛','💖','🌹','✨'][Math.floor(Math.random()*9)];
                heartSpan.style.position = 'fixed';
                heartSpan.style.fontSize = Math.random() * 24 + 12 + 'px';
                heartSpan.style.left = Math.random() * 100 + '%';
                heartSpan.style.top = '90%';
                heartSpan.style.pointerEvents = 'none';
                heartSpan.style.zIndex = '999';
                heartSpan.style.opacity = '0.9';
                heartSpan.style.filter = 'drop-shadow(0 0 3px gold)';
                const durationFly = Math.random() * 2 + 1.2;
                heartSpan.animate([
                    { transform: 'translateY(0px) rotate(0deg)', opacity: 0.9 },
                    { transform: `translateY(-${Math.random() * 400 + 200}px) rotate(${Math.random() * 180 - 90}deg)`, opacity: 0.2 }
                ], {
                    duration: durationFly * 800,
                    easing: 'cubic-bezier(0.2, 0.8, 0.4, 1)',
                    fill: 'forwards'
                });
                document.body.appendChild(heartSpan);
                setTimeout(() => heartSpan.remove(), durationFly * 900);
            }
            // un pequeño efecto de brillo en la tarjeta
            cardDiv.style.transform = 'scale(1.01)';
            setTimeout(() => { cardDiv.style.transform = ''; }, 180);
        });

        // animación adicional: pequeñas flores efímeras al cargar la página (saludo inicial)
        setTimeout(() => {
            for(let i=0; i<18; i++) {
                const petalFly = document.createElement('div');
                petalFly.innerHTML = '🌸';
                petalFly.style.position = 'fixed';
                petalFly.style.fontSize = '18px';
                petalFly.style.left = Math.random() * 100 + '%';
                petalFly.style.top = '70%';
                petalFly.style.opacity = '0.7';
                petalFly.style.pointerEvents = 'none';
                petalFly.style.zIndex = '90';
                petalFly.style.animation = `confettiFall ${Math.random() * 2 + 1.8}s ease-in forwards`;
                document.body.appendChild(petalFly);
                setTimeout(() => petalFly.remove(), 3000);
            }
        }, 200);
        
        // Evento de mover ratón sutil sobre rosa (resplandor)
        roseDiv.addEventListener('mouseenter', () => {
            roseDiv.style.filter = 'drop-shadow(0 0 12px rgba(255, 80, 100, 0.6))';
        });
        roseDiv.addEventListener('mouseleave', () => {
            roseDiv.style.filter = 'drop-shadow(0 12px 18px rgba(0, 0, 0, 0.25))';
        });
        
        // Texto cumpleaños efecto de ondas
        const titleSpan = document.querySelector('.birthday-text');
        setInterval(() => {
            if(Math.random() > 0.7) {
                titleSpan.style.textShadow = '0 0 8px #ffa07a';
                setTimeout(() => titleSpan.style.textShadow = '', 400);
            }
        }, 1800);
    })();
</script>
</body>
</html>
